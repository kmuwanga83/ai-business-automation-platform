<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Choose Your Plan - AI Business Automation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 50px;
            font-size: 1.2rem;
        }
        
        .plans {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .plan {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .plan:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .plan.popular {
            border: 2px solid #667eea;
            position: relative;
        }
        
        .popular-badge {
            position: absolute;
            top: -12px;
            right: 20px;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .plan-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .plan-price {
            font-size: 3rem;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .plan-price span {
            font-size: 1rem;
            color: #666;
        }
        
        .features {
            list-style: none;
            text-align: left;
            margin: 20px 0;
        }
        
        .features li {
            padding: 8px 0;
            color: #555;
            font-size: 14px;
        }
        
        .features li:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 8px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        .email-input {
            max-width: 400px;
            margin: 20px auto;
            padding: 15px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 10px;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Choose Your Plan</h1>
        <div class="subtitle">Start automating your business today</div>
        
        <div class="email-input">
            <input type="email" id="email" placeholder="Your email address" required>
        </div>
        
        <div class="plans" id="plans">
            <!-- Plans will be loaded here -->
        </div>
        
        <div class="loading" id="loading">
            Processing your subscription...
        </div>
    </div>
    
    <script>
        const API_URL = '';
        let plans = [];
        
        async function loadPlans() {
            try {
                const response = await fetch(`/api/payment/plans`);
                const data = await response.json();
                plans = data.plans;
                renderPlans();
            } catch (error) {
                console.error('Error loading plans:', error);
                showMockPlans();
            }
        }
        
        function renderPlans() {
            const container = document.getElementById('plans');
            container.innerHTML = plans.map(plan => `
                <div class="plan ${plan.id === 'pro' ? 'popular' : ''}">
                    ${plan.id === 'pro' ? '<div class="popular-badge">Most Popular</div>' : ''}
                    <div class="plan-name">${plan.name}</div>
                    <div class="plan-price">
                        $${plan.price}<span>/${plan.interval}</span>
                    </div>
                    <ul class="features">
                        ${plan.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                    <button onclick="subscribe('${plan.id}')">Subscribe Now</button>
                </div>
            `).join('');
        }
        
        function showMockPlans() {
            const mockPlans = [
                { id: 'basic', name: 'Basic', price: 29, interval: 'month', features: ['100 AI generations', 'Email support'] },
                { id: 'pro', name: 'Pro', price: 99, interval: 'month', features: ['Unlimited AI', 'Priority support', 'API access'] }
            ];
            const container = document.getElementById('plans');
            container.innerHTML = mockPlans.map(plan => `
                <div class="plan">
                    <div class="plan-name">${plan.name}</div>
                    <div class="plan-price">$${plan.price}<span>/${plan.interval}</span></div>
                    <ul class="features">
                        ${plan.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                    <button onclick="alert('Please add Stripe API keys for real payments')">Subscribe (Demo)</button>
                </div>
            `).join('');
        }
        
        async function subscribe(planId) {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('Please enter your email address');
                return;
            }
            
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            try {
                const response = await fetch(`/api/payment/create-checkout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, planId })
                });
                
                const data = await response.json();
                
                if (data.success && data.url) {
                    window.open(data.url, '_blank');
                } else {
                    alert('Payment system ready! Add Stripe keys to enable real payments.');
                }
            } catch (error) {
                alert('Demo mode: Payment integration ready. Add Stripe keys for real payments.');
            } finally {
                loading.style.display = 'none';
            }
        }
        
        // Load plans when page loads
        loadPlans();
    </script>
</body>
</html>
