<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Business Automation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }
        .status {
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
        }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Business Automation</h1>
        <div id="status" class="status online">✅ Connected to AI Server</div>
        
        <label>📧 Campaign Type:</label>
        <select id="campaign">
            <option>Product Launch</option>
            <option>Newsletter</option>
            <option>Customer Follow-up</option>
        </select>
        
        <label>👥 Audience:</label>
        <select id="audience">
            <option>Small Business Owners</option>
            <option>Enterprise Clients</option>
            <option>Existing Customers</option>
        </select>
        
        <button onclick="generateEmail()">✨ Generate Email ✨</button>
        
        <div class="result" id="result">
            <strong>Generated Email:</strong>
            <div id="emailContent"></div>
        </div>
    </div>
    
    <script>
        async function generateEmail() {
            const campaign = document.getElementById('campaign').value;
            const audience = document.getElementById('audience').value;
            const resultDiv = document.getElementById('result');
            const emailContent = document.getElementById('emailContent');
            
            resultDiv.style.display = 'block';
            emailContent.innerHTML = '⏳ Generating...';
            
            // Try local server first, fallback to mock if offline
            const serverUrl = 'http://localhost:3000';
            
            try {
                // Check if server is reachable
                const healthCheck = await fetch(`${serverUrl}/health`).catch(() => null);
                
                if (healthCheck && healthCheck.ok) {
                    // Use real API
                    const response = await fetch(`${serverUrl}/api/email/generate-email`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ campaign, audience, tone: 'professional' })
                    });
                    const data = await response.json();
                    emailContent.innerHTML = data.email || data.message;
                    document.getElementById('status').className = 'status online';
                    document.getElementById('status').innerHTML = '✅ Connected to AI Server';
                } else {
                    // Use mock response
                    emailContent.innerHTML = `Subject: Exciting ${campaign} for ${audience}\n\nDear ${audience},\n\nThis is an AI-generated email about our ${campaign}. Your server isn't running, so this is a test message.\n\nBest regards,\nAI Team`;
                    document.getElementById('status').className = 'status offline';
                    document.getElementById('status').innerHTML = '⚠️ Offline Mode - Start server for AI features';
                }
            } catch (error) {
                emailContent.innerHTML = `⚠️ Cannot reach server (${error.message})\n\nMake sure to run: npm run dev\n\nUsing offline mode...\n\nSubject: Test Email\n\nThis is a test message.`;
                document.getElementById('status').className = 'status offline';
                document.getElementById('status').innerHTML = '⚠️ Offline - Server not running';
            }
        }
    </script>
</body>
</html>
